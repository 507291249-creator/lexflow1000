name: MVP 2 Sprint 1A.5 migration validation

on:
  workflow_dispatch:
  push:
    branches:
      - "agent/mvp2-sprint1a5-validation"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/mvp2-sprint1a5-validation.yml"

jobs:
  migration-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      TEST_POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      ALLOW_LOCAL_AI_FALLBACK: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run SQLite and PostgreSQL migration tests
        working-directory: backend
        run: pytest -q
