name: MVP 2 Sprint 1B storage validation

on:
  workflow_dispatch:
  push:
    branches:
      - "agent/mvp2-sprint1b-storage-validation"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/mvp2-sprint1b-storage-validation.yml"

jobs:
  storage-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      TEST_POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      ALLOW_LOCAL_AI_FALLBACK: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run migration and storage tests
        working-directory: backend
        run: pytest -q

  r2-live-validation:
    if: github.event_name == 'workflow_dispatch'
    needs: storage-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      STORAGE_PROVIDER: r2
      STORAGE_VALIDATION_NON_PRODUCTION: "true"
      S3_ENDPOINT_URL: ${{ secrets.R2_TEST_ENDPOINT_URL }}
      S3_ACCESS_KEY_ID: ${{ secrets.R2_TEST_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.R2_TEST_SECRET_ACCESS_KEY }}
      S3_BUCKET_NAME: ${{ secrets.R2_TEST_BUCKET_NAME }}
      S3_REGION: auto

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Validate non-production R2 upload, download, and delete
        working-directory: backend
        run: python scripts/validate_object_storage.py
